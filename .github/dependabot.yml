# Dependabot — Automatic dependency updates
# Checks for updates weekly and creates PRs

version: 2

updates:
  # npm/bun dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Belgrade'
    open-pull-requests-limit: 10
    target-branch: 'develop'
    labels:
      - 'dependencies'
      - 'automated'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      # Group minor/patch updates together
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
      # Group major updates separately (breaking changes)
      major:
        update-types:
          - 'major'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    target-branch: 'develop'
    labels:
      - 'dependencies'
      - 'github-actions'
      - 'automated'
    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'

  # Docker
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    target-branch: 'develop'
    labels:
      - 'dependencies'
      - 'docker'
      - 'automated'
