# =============================================================================
# OraProjekt — GitHub Actions Deploy Pipeline
# =============================================================================
# Auto-deploy to Vercel on push to main/develop
# Vercel handles the build process itself (not prebuilt)
# =============================================================================

name: Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'public/**'
      - 'package.json'
      - 'bun.lock'
      - 'next.config.ts'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Install Vercel CLI
        run: npm install -g vercel

      - name: 🔗 Link project
        run: vercel link --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🚀 Deploy to Vercel (let Vercel build)
        id: deploy
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            DEPLOY_URL=$(vercel --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -o 'https://[^ ]*\.vercel\.app' | head -1)
            echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
            echo "✅ Deployed to production: $DEPLOY_URL"
          else
            DEPLOY_URL=$(vercel --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -o 'https://[^ ]*\.vercel\.app' | head -1)
            echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
            echo "✅ Deployed to preview: $DEPLOY_URL"
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 📢 Notify deployment
        run: |
          echo "::notice::Deployed to ${{ steps.deploy.outputs.url }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
