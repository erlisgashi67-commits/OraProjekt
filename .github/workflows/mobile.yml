# =============================================================================
# OraProjekt — GitHub Actions Mobile Build Pipeline
# =============================================================================
# Build Android APK on push to main (when mobile/web files change)
#
# ubuntu-latest already has Android SDK pre-installed with:
#   - platforms;android-34 (and others)
#   - build-tools;34.0.0 (and others)
#   - cmdline-tools
#   - platform-tools
# =============================================================================

name: Mobile Build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'capacitor.config.ts'
      - 'assets/**'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Build Android APK (debug — for sideloading, no Play Store needed)
  # ===========================================================================
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔧 Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 📱 Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          echo "Android SDK licenses accepted"
          echo "Available platforms:"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed 2>/dev/null | grep "platforms\|build-tools" || echo "Using pre-installed SDK"

      - name: 🍞 Install Capacitor CLI
        run: bun add -D @capacitor/cli

      - name: 🔄 Sync Capacitor
        run: |
          # Create minimal web assets (Capacitor needs the directory)
          mkdir -p out
          cat > out/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="sq">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
            <title>OraProjekt</title>
            <style>
              body { margin:0; padding:0; font-family:sans-serif; background:#10b981; color:white;
                     display:flex; flex-direction:column; align-items:center; justify-content:center;
                     min-height:100vh; text-align:center; }
              h1 { font-size:24px; margin:0 0 8px; }
              p { font-size:14px; opacity:0.85; }
            </style>
          </head>
          <body>
            <h1>OraProjekt</h1>
            <p>Po ngarkohet... hapeni nga browser-i: oraprojekt.vercel.app</p>
            <script>if(window.top===window.self){window.location.href='https://oraprojekt.vercel.app';}</script>
          </body>
          </html>
          HTMLEOF
          npx cap sync android

      - name: 🏗️ Build Android Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: 📦 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oraprojekt-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          compression-level: 9

      - name: 📊 APK Info
        run: |
          echo "::notice::Android APK built successfully"
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
          echo "Download from: Actions tab → Mobile Build → oraprojekt-android-apk"

  # ===========================================================================
  # iOS Build Info (placeholder — no Mac runner needed)
  # ===========================================================================
  ios-info:
    name: 🍎 iOS Build Info
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: ℹ️ iOS Build Information
        run: |
          echo "::notice::iOS build requires Apple Developer account ($99/year)"
          echo "::notice::To build iOS app:"
          echo "1. Enroll at https://developer.apple.com/programs/ ($99/year)"
          echo "2. On a Mac: npx cap open ios"
          echo "3. Xcode: Product → Archive → Distribute App"
          echo "4. Submit to App Store Connect"
          echo ""
          echo "Alternative (FREE): PWA installation"
          echo "1. Open https://oraprojekt.vercel.app in Safari (iPhone)"
          echo "2. Share → Add to Home Screen"
          echo "3. App appears with icon — no App Store needed!"
