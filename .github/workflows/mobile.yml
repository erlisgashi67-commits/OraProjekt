# =============================================================================
# OraProjekt — GitHub Actions Mobile Build Pipeline
# =============================================================================
# Build iOS + Android apps on push to main (when mobile files change)
#
# This workflow:
#   1. Syncs web assets to Capacitor
#   2. Builds Android APK (debug, for sideloading)
#   3. Uploads APK as artifact (downloadable from GitHub Actions tab)
#
# NOTE: iOS build requires Mac runner + Apple Developer account.
#       For now, only Android APK is built (free, no account needed).
# =============================================================================

name: Mobile Build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'capacitor.config.ts'
      - 'assets/**'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CAPACITOR_URL: 'https://oraprojekt.vercel.app'

jobs:
  # ===========================================================================
  # Build Android APK (debug)
  # ===========================================================================
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔧 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0

      - name: 🍞 Install Capacitor CLI
        run: bun add -D @capacitor/cli

      - name: 🔄 Sync Capacitor
        run: |
          # Create minimal web assets (Capacitor needs the directory)
          mkdir -p out
          echo '<html><body><h1>OraProjekt</h1><p>Loading...</p></body></html>' > out/index.html
          npx cap sync android

      - name: 🏗️ Build Android Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: 📦 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oraprojekt-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          compression-level: 9

      - name: 📊 APK Info
        run: |
          echo "::notice::Android APK built successfully"
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
          echo "Download from: Actions → Mobile Build → oraprojekt-android-apk"

  # ===========================================================================
  # Build iOS (placeholder — requires Mac + Apple Developer account)
  # ===========================================================================
  build-ios:
    name: 🍎 Build iOS (placeholder)
    runs-on: macos-latest
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔄 Sync Capacitor
        run: |
          mkdir -p out
          echo '<html><body><h1>OraProjekt</h1></body></html>' > out/index.html
          npx cap sync ios

      - name: ℹ️ iOS Build Info
        run: |
          echo "::notice::iOS build requires Apple Developer account ($99/year)"
          echo "To enable:"
          echo "1. Enroll at https://developer.apple.com/programs/"
          echo "2. Add secrets: APPLE_CERTIFICATE, APPLE_PROVISIONING_PROFILE"
          echo "3. Uncomment the build steps below"
          # - name: 🏗️ Build iOS
          #   run: |
          #     cd ios/App
          #     xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive archive CODE_SIGNING_REQUIRED=NO
