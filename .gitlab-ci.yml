# =============================================================================
# OraProjekt — GitLab CI/CD Pipeline
# =============================================================================
# Stages:
#   1. lint    — ESLint check
#   2. test    — (placeholder for unit/integration tests)
#   3. build   — Next.js production build
#   4. deploy  — Deploy to staging/production
#
# Required GitLab CI/CD Variables (Settings → CI/CD → Variables):
#   - DATABASE_URL           — production database URL
#   - AUTH_SECRET            — NextAuth secret (generate: openssl rand -base64 32)
#   - GOOGLE_CLIENT_ID       — Google OAuth client ID
#   - GOOGLE_CLIENT_SECRET   — Google OAuth client secret
#   - DEPLOY_SSH_KEY         — SSH private key for deployment server
#   - DEPLOY_HOST            — deployment server hostname
#   - DEPLOY_USER            — deployment server user
#   - DEPLOY_PATH            — deployment path on server
# =============================================================================

# Use Bun for faster installs (compatible with package.json)
image: oven/bun:1.3

# Cache dependencies between runs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .bun/
    - node_modules/
    - .next/cache/

variables:
  BUN_INSTALL_CACHE_DIR: "$CI_PROJECT_DIR/.bun"

# Define pipeline stages
stages:
  - lint
  - test
  - build
  - deploy

# =============================================================================
# Stage 1: Lint — run on every commit
# =============================================================================
lint:
  stage: lint
  script:
    - bun install --frozen-lockfile
    - bun run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# =============================================================================
# Stage 2: Test — placeholder for future unit/integration tests
# =============================================================================
test:
  stage: test
  script:
    - bun install --frozen-lockfile
    # Generate Prisma client
    - bun run db:generate
    # Run tests when they exist
    # - bun test
    - echo "Tests placeholder — add tests in __tests__/ or *.test.ts files"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# =============================================================================
# Stage 3: Build — production build (only on main/develop/tags)
# =============================================================================
build:
  stage: build
  script:
    - bun install --frozen-lockfile
    - bun run db:generate
    - bun run build
  artifacts:
    paths:
      - .next/
      - public/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  needs: ["lint", "test"]

# =============================================================================
# Stage 4: Deploy — Staging (develop branch)
# =============================================================================
deploy:staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" > ~/.ssh/config
  script:
    - echo "Deploying to staging..."
    - rsync -avz --delete
        --exclude '.git'
        --exclude 'node_modules'
        --exclude '.next/cache'
        -e "ssh -p 22"
        ./ ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/staging/
    - ssh ${DEPLOY_USER}@${DEPLOY_HOST}
        "cd ${DEPLOY_PATH}/staging &&
         bun install --production --frozen-lockfile &&
         bun run db:generate &&
         bun run db:push &&
         pm2 reload oraprojekt-staging || pm2 start 'bun run start' --name oraprojekt-staging"
    - echo "Staging deploy complete!"
  environment:
    name: staging
    url: https://staging.oraprojekt.com
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  needs: ["build"]
  when: manual

# =============================================================================
# Stage 4: Deploy — Production (main branch or tags)
# =============================================================================
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" > ~/.ssh/config
  script:
    - echo "Deploying to production..."
    - rsync -avz --delete
        --exclude '.git'
        --exclude 'node_modules'
        --exclude '.next/cache'
        -e "ssh -p 22"
        ./ ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/production/
    - ssh ${DEPLOY_USER}@${DEPLOY_HOST}
        "cd ${DEPLOY_PATH}/production &&
         bun install --production --frozen-lockfile &&
         bun run db:generate &&
         bun run db:push &&
         pm2 reload oraprojekt-production || pm2 start 'bun run start' --name oraprojekt-production"
    - echo "Production deploy complete!"
  environment:
    name: production
    url: https://oraprojekt.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["build"]
  when: manual

# =============================================================================
# Scheduled database backup (runs daily at 2 AM UTC)
# =============================================================================
backup:database:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
  script:
    - echo "Creating database backup..."
    - ssh ${DEPLOY_USER}@${DEPLOY_HOST}
        "cd ${DEPLOY_PATH}/production &&
         TIMESTAMP=\$(date +%Y%m%d_%H%M%S) &&
         bun run db:generate &&
         npx prisma db execute --stdin < backup.sql || true &&
         mkdir -p backups &&
         cp db/custom.db backups/custom_\$TIMESTAMP.db &&
         find backups/ -mtime +30 -delete"
    - echo "Backup complete!"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: scheduled
  needs: []
