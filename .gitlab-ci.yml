# =============================================================================
# OraProjekt — GitLab CI/CD Pipeline
# =============================================================================
# Stages:
#   1. lint    — ESLint check
#     2. test   — Prisma client generation (placeholder for unit tests)
#   3. build   — Next.js production build
#   4. deploy  — Deploy to staging/production (manual trigger)
# =============================================================================

# Use Bun image (official, latest stable)
image: oven/bun:latest

# Cache dependencies between runs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .bun/
    - node_modules/
    - .next/cache/

variables:
  BUN_INSTALL_CACHE_DIR: "$CI_PROJECT_DIR/.bun"

# Define pipeline stages
stages:
  - lint
  - test
  - build
  - deploy

# =============================================================================
# Stage 1: Lint — run on every commit
# =============================================================================
lint:
  stage: lint
  script:
    - bun install --frozen-lockfile
    - bun run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  allow_failure: false

# =============================================================================
# Stage 2: Test — placeholder for future unit/integration tests
# =============================================================================
test:
  stage: test
  script:
    - bun install --frozen-lockfile
    - bun run db:generate
    - echo "Tests placeholder — add tests in __tests__/ or *.test.ts files"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: false

# =============================================================================
# Stage 3: Build — production build (only on main/develop/tags)
# =============================================================================
build:
  stage: build
  script:
    - bun install --frozen-lockfile
    - bun run db:generate
    - bun run build
  artifacts:
    paths:
      - .next/
      - public/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  needs: []
  allow_failure: false

# =============================================================================
# Stage 4: Deploy — Staging (develop branch, manual trigger)
# =============================================================================
deploy-staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" > ~/.ssh/config
  script:
    - echo "Deploying to staging..."
    - echo "This is a manual deploy job. Configure SSH keys in CI/CD variables."
    - echo "Target staging server configured in CI/CD variables"
  environment:
    name: staging
    url: https://staging.oraprojekt.com
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual
  needs: ["build"]
  allow_failure: true

# =============================================================================
# Stage 4: Deploy — Production (main branch, manual trigger)
# =============================================================================
deploy-production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" > ~/.ssh/config
  script:
    - echo "Deploying to production..."
    - echo "This is a manual deploy job. Configure SSH keys in CI/CD variables."
    - echo "Target production server configured in CI/CD variables"
  environment:
    name: production
    url: https://oraprojekt.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  needs: ["build"]
  allow_failure: true
